<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Smart Car Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(180deg, #0f172a 0%, #0b1220 100%);
  color: #e2e8f0;
  height: 100vh;
  overflow: hidden;
}
.wrap {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 10px 14px;
  gap: 8px;
}

/* Hero bar */
.hero {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: rgba(17,24,39,0.96);
  border: 1px solid rgba(71,85,105,0.6);
  border-radius: 10px;
  flex-shrink: 0;
}
.hero h1 { font-size: 20px; color: #f8fafc; }
.hero .pills { display: flex; gap: 10px; align-items: center; }
.pill {
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  background: rgba(59,130,246,0.18);
  color: #93c5fd;
  border: 1px solid rgba(59,130,246,0.35);
}
.pill.green { background: rgba(16,185,129,0.18); color: #6ee7b7; border-color: rgba(16,185,129,0.35); }
.pill.yellow { background: rgba(251,191,36,0.18); color: #fcd34d; border-color: rgba(251,191,36,0.35); }
.hero .btns { display: flex; gap: 6px; }
.hero .btns button, .hero .btns a {
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 12px;
  border: 1px solid rgba(71,85,105,0.8);
  background: rgba(30,41,59,0.9);
  color: #cbd5e1;
  cursor: pointer;
  text-decoration: none;
}
.hero .btns button:hover, .hero .btns a:hover { background: rgba(59,130,246,0.18); color: #f8fafc; }
.hero .btns button.active { background: rgba(220,38,38,0.25); border-color: rgba(220,38,38,0.6); color: #fca5a5; }

/* Main grid */
.main {
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(380px, 1fr);
  gap: 8px;
  flex: 1;
  min-height: 0;
}

/* Image panel */
.img-panel {
  display: flex;
  flex-direction: column;
  background: rgba(17,24,39,0.96);
  border: 1px solid rgba(71,85,105,0.6);
  border-radius: 10px;
  padding: 8px;
}
.img-panel .title {
  font-size: 13px;
  color: #93c5fd;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.img-panel canvas {
  flex: 1;
  width: 100%;
  min-height: 0;
  border-radius: 6px;
  image-rendering: pixelated;
  background: #000;
}

/* Right column */
.right-col {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
  overflow: hidden;
}

/* IPM panel */
.ipm-panel {
  background: rgba(17,24,39,0.96);
  border: 1px solid rgba(71,85,105,0.6);
  border-radius: 10px;
  padding: 8px;
  flex-shrink: 0;
}
.ipm-panel .title { font-size: 13px; color: #93c5fd; margin-bottom: 4px; }
.ipm-panel canvas { width: 100%; border-radius: 6px; image-rendering: pixelated; background: #000; }

/* Status panels */
.status-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.status-card {
  background: rgba(17,24,39,0.96);
  border: 1px solid rgba(71,85,105,0.6);
  border-radius: 10px;
  padding: 8px;
  overflow-y: auto;
}
.status-card .title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(71,85,105,0.3);
}
.status-card .title.vision { color: #93c5fd; }
.status-card .title.control { color: #6ee7b7; }
.status-card table { width: 100%; font-size: 11px; border-collapse: collapse; }
.status-card td { padding: 2px 4px; }
.status-card td.label { color: #94a3b8; white-space: nowrap; width: 1%; }
.status-card td.value { color: #e2e8f0; text-align: right; font-variant-numeric: tabular-nums; font-family: "JetBrains Mono","Consolas",monospace; }
.status-card .sub-title {
  font-size: 11px;
  color: #64748b;
  padding: 4px 0 2px;
  border-bottom: 1px solid rgba(71,85,105,0.15);
  margin-bottom: 2px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>Smart Car Dashboard</h1>
    <div class="pills">
      <span class="pill" id="wsPill">WS 等待</span>
      <span class="pill green" id="fpsPill">0 fps</span>
      <span class="pill yellow" id="modePill">-</span>
      <span class="pill" id="kbpsPill">0 KB/s</span>
    </div>
    <div class="btns">
      <button id="btnRecord">录制</button>
      <button id="btnStop" style="display:none">停止</button>
      <a href="/config.html">参数配置</a>
      <a href="/playback.html">录制回放</a>
    </div>
  </div>

  <div class="main">
    <!-- Left: main image -->
    <div class="img-panel">
      <div class="title">Main View <span id="imgLabel">-</span></div>
      <canvas id="mainCanvas" width="160" height="120"></canvas>
    </div>

    <!-- Right: IPM + status -->
    <div class="right-col">
      <div class="ipm-panel">
        <div class="title">IPM Perspective (280x140)</div>
        <canvas id="ipmCanvas" width="280" height="140"></canvas>
      </div>
      <div class="status-grid">
        <div class="status-card" id="visionCard">
          <div class="title vision">Vision Status</div>
          <div id="visionContent"></div>
        </div>
        <div class="status-card" id="controlCard">
          <div class="title control">Control Status</div>
          <div id="controlContent"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const mainCanvas = document.getElementById('mainCanvas');
  const mainCtx = mainCanvas.getContext('2d', { willReadFrequently: false });
  const ipmCanvas = document.getElementById('ipmCanvas');
  const ipmCtx = ipmCanvas.getContext('2d');

  const wsPill = document.getElementById('wsPill');
  const fpsPill = document.getElementById('fpsPill');
  const modePill = document.getElementById('modePill');
  const kbpsPill = document.getElementById('kbpsPill');
  const imgLabel = document.getElementById('imgLabel');
  const visionContent = document.getElementById('visionContent');
  const controlContent = document.getElementById('controlContent');

  const btnRecord = document.getElementById('btnRecord');
  const btnStop = document.getElementById('btnStop');

  let pendingFrame = null;
  let frameCount = 0;
  let fpsTime = performance.now();
  let byteCount = 0;

  // Recording state
  let mediaRecorder = null;
  let recordedChunks = [];

  const MODE_NAMES = { 0: 'Binary', 1: 'Gray' };
  const ROUTE_MAIN = ['Normal','Circle','Straight','Cross'];
  const ROUTE_SUB = {
    '0,0':'Normal','1,0':'Circle-Left-Entry','1,1':'Circle-Left-Stage1','1,2':'Circle-Left-Stage2',
    '1,3':'Circle-Left-Stage3','1,4':'Circle-Left-Stage4','1,5':'Circle-Left-Stage5','1,6':'Circle-Left-Stage6',
    '2,0':'Circle-Right-Entry','2,1':'Circle-Right-Stage1','2,2':'Circle-Right-Stage2',
    '2,3':'Circle-Right-Stage3','2,4':'Circle-Right-Stage4','2,5':'Circle-Right-Stage5','2,6':'Circle-Right-Stage6',
    '3,0':'Straight','4,0':'Cross-Entry','4,1':'Cross-Stage2','4,2':'Cross-Stage3'
  };
  const CENTERLINE_SOURCE = ['None','FromLeft','FromRight'];

  function routeStateName(main, sub) {
    const key = main + ',' + sub;
    if (ROUTE_SUB[key]) return ROUTE_SUB[key];
    return (ROUTE_MAIN[main] || ('State'+main)) + '/' + sub;
  }

  function fmt(v, d) {
    if (v === undefined || v === null || (typeof v === 'number' && !isFinite(v))) return d !== undefined ? d : '-';
    if (typeof v === 'number') {
      if (Number.isInteger(v)) return String(v);
      return v.toFixed(3);
    }
    return String(v);
  }

  function buildVisionHTML(s) {
    if (!s) return '<span style="color:#64748b">等待数据...</span>';
    const detourName = routeStateName(s.detour ? s.detour.route_main : 0, s.detour ? s.detour.route_sub : 0);
    const el = s.elements || {};
    const cl = s.centerline || {};
    return '<table>' +
      '<tr><td class="label">Line Error</td><td class="value">' + fmt(s.line_error) + ' px</td></tr>' +
      '<tr><td class="label">Elements:</td><td class="value">' +
        'Red ' + (el.red_found ? 'YES' : 'no') +
        ' | NCNN ' + fmt(el.ncnn_label, 'none') + ' ' + fmt(el.ncnn_score, '0') +
      '</td></tr>' +
      '<tr><td class="label">Detour:</td><td class="value">' + detourName +
        ' | Zebra ' + fmt(s.detour ? s.detour.zebra : 0) +
        ' | Src ' + fmt(s.detour ? s.detour.preferred_source : 0) +
      '</td></tr>' +
      '<tr><td class="label">Centerline:</td><td class="value">' +
        'Src ' + CENTERLINE_SOURCE[cl.source] +
        ' | Pts ' + fmt(cl.selected_count) +
        ' | Valid ' + fmt(cl.track_valid) +
      '</td></tr>' +
      '<tr><td class="label">Track Point:</td><td class="value">' +
        (cl.track_point ? cl.track_point[0]+','+cl.track_point[1] : '-') +
        ' idx ' + fmt(cl.track_index) +
      '</td></tr>' +
      '<tr><td class="label">FPS:</td><td class="value">' +
        'cap ' + fmt(s.fps ? s.fps.capture : 0) +
        ' | vis ' + fmt(s.fps ? s.fps.vision : 0) +
        ' | tx ' + fmt(s.fps ? s.fps.tx : 0) +
      '</td></tr>' +
    '</table>';
  }

  function buildControlHTML(s) {
    if (!s) return '<span style="color:#64748b">等待数据...</span>';
    const pid = s.pid || {};
    const wh = s.wheels || {};
    const sp = s.speed || {};
    const im = s.imu || {};
    const pos = pid.pos || {};
    const yaw = pid.yaw || {};
    const L = wh.left || {};
    const R = wh.right || {};
    return '<table>' +
      '<tr><td colspan="2" class="sub-title">PID Loops</td></tr>' +
      '<tr><td class="label">Position:</td><td class="value">err ' + fmt(pos.error) + ' | out ' + fmt(pos.output) + ' | Kp ' + fmt(pos.kp_dynamic) + '</td></tr>' +
      '<tr><td class="label">Yaw:</td><td class="value">ref ' + fmt(yaw.ref) + ' | err ' + fmt(yaw.error) + ' | out ' + fmt(yaw.output) + '</td></tr>' +
      '<tr><td class="label">Steering:</td><td class="value">' + fmt(pid.steering) + '</td></tr>' +
      '<tr><td colspan="2" class="sub-title">Wheels</td></tr>' +
      '<tr><td class="label">Left:</td><td class="value">tgt ' + fmt(L.target) + ' | cur ' + fmt(L.current) + ' | err ' + fmt(L.error) + ' | dty ' + fmt(L.duty) + '</td></tr>' +
      '<tr><td class="label">Right:</td><td class="value">tgt ' + fmt(R.target) + ' | cur ' + fmt(R.current) + ' | err ' + fmt(R.error) + ' | dty ' + fmt(R.duty) + '</td></tr>' +
      '<tr><td colspan="2" class="sub-title">Speed &amp; IMU</td></tr>' +
      '<tr><td class="label">Base:</td><td class="value">' + fmt(sp.base) + ' | adj ' + fmt(sp.adjusted) + '</td></tr>' +
      '<tr><td class="label">IMU:</td><td class="value">gyro_z ' + fmt(im.gyro_z) + ' | yaw_ref ' + fmt(im.yaw_ref) + ' | yaw_err ' + fmt(im.yaw_error) + '</td></tr>' +
    '</table>';
  }

  function updateStatusPanels(status) {
    visionContent.innerHTML = buildVisionHTML(status);
    controlContent.innerHTML = buildControlHTML(status);
  }

  function render(now) {
    requestAnimationFrame(render);
    if (!pendingFrame) return;

    const f = pendingFrame;
    pendingFrame = null;

    // FPS counter
    frameCount++;
    if (now - fpsTime >= 1000) {
      const fps = Math.round(frameCount * 1000 / (now - fpsTime));
      fpsPill.textContent = fps + ' fps';
      kbpsPill.textContent = (byteCount / 1024).toFixed(0) + ' KB/s';
      frameCount = 0;
      fpsTime = now;
      byteCount = 0;
    }

    // Update status panels
    updateStatusPanels(f.status);

    // Update mode label
    if (f.mode !== undefined) {
      modePill.textContent = MODE_NAMES[f.mode] || ('Mode'+f.mode);
      imgLabel.textContent = MODE_NAMES[f.mode] || ('Mode'+f.mode);
    }

    // Render main image
    createImageBitmap(f.blob).then(function(bmp) {
      if (mainCanvas.width !== bmp.width || mainCanvas.height !== bmp.height) {
        mainCanvas.width = bmp.width;
        mainCanvas.height = bmp.height;
      }
      mainCtx.drawImage(bmp, 0, 0);
      bmp.close();
    }).catch(function() {});

    // Draw IPM boundaries (centerline from status)
    drawIpmOverlay(f.status);
  }

  // Simple IPM centerline overlay
  function drawIpmOverlay(status) {
    if (!status) return;
    ipmCtx.clearRect(0, 0, ipmCanvas.width, ipmCanvas.height);
    ipmCtx.fillStyle = '#0b1220';
    ipmCtx.fillRect(0, 0, ipmCanvas.width, ipmCanvas.height);

    // Draw centerline track point if valid
    const cl = status.centerline;
    if (cl && cl.track_valid && cl.track_point) {
      const px = (cl.track_point[0] / 280) * ipmCanvas.width;
      const py = (cl.track_point[1] / 140) * ipmCanvas.height;
      ipmCtx.fillStyle = '#22c55e';
      ipmCtx.beginPath();
      ipmCtx.arc(px, py, 4, 0, Math.PI * 2);
      ipmCtx.fill();
    }

    // Label
    ipmCtx.fillStyle = '#64748b';
    ipmCtx.font = '10px monospace';
    ipmCtx.fillText('IPM 280x140', 4, 12);
    if (cl) {
      ipmCtx.fillStyle = '#93c5fd';
      ipmCtx.fillText('Src:' + CENTERLINE_SOURCE[cl.source] + ' Pts:' + fmt(cl.selected_count), 4, 26);
    }
  }

  // WebSocket connection
  function connectWS() {
    const ws = new WebSocket('ws://' + location.host + '/');
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      wsPill.textContent = 'WS OK';
      wsPill.className = 'pill green';
    };

    ws.onclose = function() {
      wsPill.textContent = 'WS 断开';
      wsPill.className = 'pill';
      setTimeout(connectWS, 2000);
    };

    ws.onerror = function() {
      wsPill.textContent = 'WS 错误';
      wsPill.className = 'pill';
    };

    ws.onmessage = function(event) {
      if (typeof event.data === 'string') {
        try {
          var msg = JSON.parse(event.data);
          if (msg.type === 'status' && msg.data) {
            updateStatusPanels(msg.data);
          }
        } catch(_) {}
        return;
      }

      // Binary message
      var buf = event.data;
      byteCount += buf.byteLength;
      var view = new DataView(buf);
      var statusLen = view.getUint16(0, false);

      var status = null;
      var imageStart = 2;
      if (statusLen > 0 && statusLen < buf.byteLength - 2) {
        try {
          var statusStr = new TextDecoder().decode(new Uint8Array(buf, 2, statusLen));
          status = JSON.parse(statusStr);
        } catch(_) {}
        imageStart = 2 + statusLen;
      }

      var imageBytes = new Uint8Array(buf, imageStart);
      pendingFrame = {
        status: status,
        blob: new Blob([imageBytes], { type: 'image/jpeg' })
      };
    };
  }

  // Recording
  btnRecord.addEventListener('click', function() {
    var stream = mainCanvas.captureStream(60);
    var mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
    recordedChunks = [];
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      var blob = new Blob(recordedChunks, { type: 'video/webm' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'smartcar_' + new Date().toISOString().replace(/[:.]/g,'-') + '.webm';
      a.click();
      URL.revokeObjectURL(url);
    };
    mediaRecorder.start();
    btnRecord.style.display = 'none';
    btnStop.style.display = '';
    btnRecord.classList.add('active');
  });

  btnStop.addEventListener('click', function() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    btnRecord.style.display = '';
    btnStop.style.display = 'none';
    btnRecord.classList.remove('active');
  });

  // Start
  connectWS();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
