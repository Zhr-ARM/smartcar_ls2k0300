<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vision JS Receiver</title>
  <style>
    body { margin: 0; font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif; background: #0f172a; color: #e2e8f0; }
    .wrap { max-width: 1200px; margin: 20px auto; padding: 0 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 12px; }
    .title { margin-bottom: 10px; color: #cbd5e1; font-size: 14px; }
    .view { position: relative; }
    canvas { width: 100%; background: #000; border-radius: 8px; image-rendering: pixelated; display: block; }
    .pixel-info {
      position: absolute;
      left: 8px;
      bottom: 8px;
      background: rgba(2, 6, 23, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 6px;
      padding: 2px 6px;
      font-size: 12px;
      color: #e2e8f0;
      pointer-events: none;
      white-space: nowrap;
    }
    .meta { margin: 8px 0 12px; color: #94a3b8; font-size: 13px; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 13px; color: #93c5fd; max-height: 280px; overflow: auto; }
    @media (max-width: 900px){ .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>智能车视觉接收端（Node.js）</h2>
    <div class="meta" id="meta">connecting...</div>
    <div class="meta">
      <label style="margin-right: 16px;">
        <input type="checkbox" id="toggleMeanCenterline" checked />
        灰度图显示所选偏移中线
      </label>
      <label>
        <input type="checkbox" id="toggleIpmAnchorDot" checked />
        透视图显示锚点圆 (x=200,y=200,r=1)
      </label>
      <label style="margin-left: 16px;">
        <input type="checkbox" id="toggleBoundaryPointMode" />
        边界/中线按采样点显示（关闭=连线）
      </label>
      <span id="ipmCenterlineSourceLabel" style="margin-left: 16px;">
        透视中线来源：自动
      </span>
    </div>
    <div class="grid">
      <div class="card">
        <div class="title">灰度图 + 迷宫左右边线（红/绿）</div>
        <div class="view">
          <canvas id="grayCanvas" width="160" height="120"></canvas>
          <div class="pixel-info" id="grayPixelInfo">x:- y:- | Gray:- Bin:- RGB:(-,-,-)</div>
        </div>
      </div>
      <div class="card">
        <div class="title">二值图（不叠加边线）</div>
        <div class="view">
          <canvas id="binaryCanvas" width="160" height="120"></canvas>
          <div class="pixel-info" id="binaryPixelInfo">x:- y:- | Gray:- Bin:- RGB:(-,-,-)</div>
        </div>
      </div>
      <div class="card">
        <div class="title">透视边界图-处理链数组（可三角滤波）</div>
        <div class="view">
          <canvas id="ipmCanvas" width="400" height="200"></canvas>
          <div class="pixel-info" id="ipmPixelInfo">x:- y:- | Gray:- Bin:- RGB:(-,-,-)</div>
        </div>
      </div>
      <div class="card">
        <div class="title">透视边界图-原始拷贝数组（角点识别）</div>
        <div class="view">
          <canvas id="ipmRawCanvas" width="400" height="200"></canvas>
          <div class="pixel-info" id="ipmRawPixelInfo">x:- y:- | Gray:- Bin:- RGB:(-,-,-)</div>
        </div>
      </div>
      <div class="card">
        <div class="title">状态数据</div>
        <pre id="status">loading...</pre>
      </div>
    </div>
  </div>
  <script>
    const grayCanvas = document.getElementById('grayCanvas');
    const grayCtx = grayCanvas.getContext('2d');
    const binaryCanvas = document.getElementById('binaryCanvas');
    const binaryCtx = binaryCanvas.getContext('2d');
    const ipmCanvas = document.getElementById('ipmCanvas');
    const ipmCtx = ipmCanvas.getContext('2d');
    const ipmRawCanvas = document.getElementById('ipmRawCanvas');
    const ipmRawCtx = ipmRawCanvas.getContext('2d');
    const grayPixelInfo = document.getElementById('grayPixelInfo');
    const binaryPixelInfo = document.getElementById('binaryPixelInfo');
    const ipmPixelInfo = document.getElementById('ipmPixelInfo');
    const ipmRawPixelInfo = document.getElementById('ipmRawPixelInfo');
    const statusEl = document.getElementById('status');
    const metaEl = document.getElementById('meta');
    const toggleMeanCenterline = document.getElementById('toggleMeanCenterline');
    const toggleIpmAnchorDot = document.getElementById('toggleIpmAnchorDot');
    const toggleBoundaryPointMode = document.getElementById('toggleBoundaryPointMode');
    const ipmCenterlineSourceLabel = document.getElementById('ipmCenterlineSourceLabel');
    const grayImg = new Image();
    const binaryImg = new Image();
    let latestStatus = {};
    let showMeanCenterline = true;
    let showIpmAnchorDot = true;
    let boundaryPointMode = false;
    function drawPolyline(ctx, pts, color, lineWidth) {
      if (!Array.isArray(pts) || pts.length < 2) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i += 1) {
        ctx.lineTo(pts[i][0], pts[i][1]);
      }
      ctx.stroke();
    }

    function drawPointSet(ctx, pts, color, radius) {
      if (!Array.isArray(pts) || pts.length < 1) return;
      ctx.fillStyle = color;
      const r = Math.max(1, radius | 0);
      for (let i = 0; i < pts.length; i += 1) {
        const p = pts[i];
        if (!Array.isArray(p) || p.length < 2) continue;
        ctx.beginPath();
        ctx.arc(p[0], p[1], r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSeries(ctx, pts, color, lineWidth, pointRadius) {
      if (boundaryPointMode) {
        drawPointSet(ctx, pts, color, pointRadius);
      } else {
        drawPolyline(ctx, pts, color, lineWidth);
      }
    }

    function scalarToColor(value, maxAbs) {
      const scale = Math.max(1e-6, maxAbs || 1);
      const t = Math.max(-1, Math.min(1, value / scale));
      if (t >= 0) {
        const r = 255;
        const g = Math.round(220 - 120 * t);
        const b = Math.round(80 - 60 * t);
        return `rgb(${r},${Math.max(80, g)},${Math.max(20, b)})`;
      }
      const u = -t;
      const r = Math.round(80 - 40 * u);
      const g = Math.round(200 + 30 * u);
      const b = 255;
      return `rgb(${Math.max(20, r)},${Math.min(255, g)},${b})`;
    }

    function combinedCornerSamples(status) {
      const leftPts = Array.isArray(status.ipm_corner_left_boundary) ? status.ipm_corner_left_boundary : [];
      const leftRaw = Array.isArray(status.ipm_corner_left_raw_angle) ? status.ipm_corner_left_raw_angle : [];
      const leftVals = Array.isArray(status.ipm_corner_left_nms) ? status.ipm_corner_left_nms : [];
      const rightPts = Array.isArray(status.ipm_corner_right_boundary) ? status.ipm_corner_right_boundary : [];
      const rightRaw = Array.isArray(status.ipm_corner_right_raw_angle) ? status.ipm_corner_right_raw_angle : [];
      const rightVals = Array.isArray(status.ipm_corner_right_nms) ? status.ipm_corner_right_nms : [];
      const samples = [];
      for (let i = 0; i < leftPts.length && i < leftVals.length; i += 1) {
        samples.push({
          point: leftPts[i],
          raw: (i < leftRaw.length) ? (Number(leftRaw[i]) || 0) : 0,
          value: Number(leftVals[i]) || 0
        });
      }
      for (let i = 0; i < rightPts.length && i < rightVals.length; i += 1) {
        samples.push({
          point: rightPts[i],
          raw: (i < rightRaw.length) ? (Number(rightRaw[i]) || 0) : 0,
          value: Number(rightVals[i]) || 0
        });
      }
      return samples;
    }

    function drawCornerDebugBoundary(ctx, status, w, h) {
      const samples = combinedCornerSamples(status);
      if (samples.length < 1) return;
      let maxAbs = 0;
      for (const sample of samples) {
        maxAbs = Math.max(maxAbs, Math.abs(sample.value));
      }
      for (const sample of samples) {
        const p = sample.point;
        if (!Array.isArray(p) || p.length < 2) continue;
        ctx.fillStyle = scalarToColor(sample.value, maxAbs);
        ctx.beginPath();
        ctx.arc(
          Math.max(0, Math.min(w - 1, p[0] | 0)),
          Math.max(0, Math.min(h - 1, p[1] | 0)),
          boundaryPointMode ? 2 : 2,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }
    }

    function findNearestCornerSample(status, x, y) {
      const samples = combinedCornerSamples(status);
      let best = null;
      let bestD2 = 36;
      for (const sample of samples) {
        const p = sample.point;
        if (!Array.isArray(p) || p.length < 2) continue;
        const dx = (p[0] | 0) - x;
        const dy = (p[1] | 0) - y;
        const d2 = dx * dx + dy * dy;
        if (d2 <= bestD2) {
          bestD2 = d2;
          best = sample;
        }
      }
      return best;
    }

    function drawIpmBoundariesToCanvas(status, canvas, ctx, leftKey, rightKey, centerKey) {
      const ipmSize = status.ipm_size || [400, 200];
      const w = ipmSize[0] || 400;
      const h = ipmSize[1] || 200;
      if (canvas.width !== w) canvas.width = w;
      if (canvas.height !== h) canvas.height = h;
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, w, h);
      if (canvas === ipmRawCanvas) {
        drawCornerDebugBoundary(ctx, status, w, h);
      } else {
        drawSeries(ctx, status[leftKey] || [], '#ff4d4f', 2, 1);
        drawSeries(ctx, status[rightKey] || [], '#22c55e', 2, 1);
      }
      if (centerKey) {
        drawSeries(ctx, status[centerKey] || [], '#facc15', 2, 1);
      }
      if (canvas === ipmCanvas && status.ipm_track_valid) {
        const tp = Array.isArray(status.ipm_track_point) ? status.ipm_track_point : [0, 0];
        const tx = Math.max(0, Math.min(w - 1, tp[0] | 0));
        const ty = Math.max(0, Math.min(h - 1, tp[1] | 0));
        const cx = Math.max(0, Math.min(w - 1, 200));
        const cy = Math.max(0, Math.min(h - 1, 200));
        ctx.strokeStyle = '#93c5fd';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(tx, ty);
        ctx.lineTo(tx, cy);
        ctx.stroke();
        drawPointSet(ctx, [[cx, cy], [tx, ty], [tx, cy]], '#93c5fd', 2);
      }
      if (showIpmAnchorDot) {
        const cx = Math.max(0, Math.min(w - 1, 200));
        const cy = Math.max(0, Math.min(h - 1, 200));
        ctx.fillStyle = '#38bdf8';
        ctx.beginPath();
        ctx.arc(cx, cy, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawIpmBoundaries(status) {
      const centerKey = (status.ipm_centerline_source === 1)
        ? 'ipm_centerline_from_right_shift'
        : 'ipm_centerline_from_left_shift';
      drawIpmBoundariesToCanvas(status, ipmCanvas, ipmCtx, 'ipm_left_boundary', 'ipm_right_boundary', centerKey);
      drawIpmBoundariesToCanvas(status, ipmRawCanvas, ipmRawCtx, 'ipm_raw_left_boundary', 'ipm_raw_right_boundary', '');
    }

    function renderGrayFrame() {
      const size = latestStatus.gray_size || [160, 120];
      const w = size[0] || 160;
      const h = size[1] || 120;
      if (grayCanvas.width !== w) grayCanvas.width = w;
      if (grayCanvas.height !== h) grayCanvas.height = h;
      grayCtx.drawImage(grayImg, 0, 0, w, h);
      const centerX = Math.max(0, Math.min(w - 1, 80));
      grayCtx.strokeStyle = '#ffffff';
      grayCtx.lineWidth = 1;
      grayCtx.beginPath();
      grayCtx.moveTo(centerX + 0.5, 0);
      grayCtx.lineTo(centerX + 0.5, h);
      grayCtx.stroke();
      const guideY = Math.max(0, Math.min(h - 1, 105));
      grayCtx.strokeStyle = '#ffffff';
      grayCtx.lineWidth = 1;
      grayCtx.beginPath();
      grayCtx.moveTo(0, guideY + 0.5);
      grayCtx.lineTo(w, guideY + 0.5);
      grayCtx.stroke();
      const left = latestStatus.left_boundary || [];
      const right = latestStatus.right_boundary || [];
      drawSeries(grayCtx, left, '#ff4d4f', 2, 1);
      drawSeries(grayCtx, right, '#22c55e', 2, 1);
      if (showMeanCenterline) {
        const selectedCenterline = (latestStatus.ipm_centerline_source === 1)
          ? (latestStatus.src_centerline_from_right_shift || [])
          : (latestStatus.src_centerline_from_left_shift || []);
        drawSeries(grayCtx, selectedCenterline, '#facc15', 2, 1);
      }
    }

    function getCanvasPoint(ev, canvas) {
      const rect = canvas.getBoundingClientRect();
      const sx = canvas.width / rect.width;
      const sy = canvas.height / rect.height;
      const x = Math.max(0, Math.min(canvas.width - 1, Math.floor((ev.clientX - rect.left) * sx)));
      const y = Math.max(0, Math.min(canvas.height - 1, Math.floor((ev.clientY - rect.top) * sy)));
      return [x, y];
    }

    function sampleRGB(ctx, x, y) {
      const d = ctx.getImageData(x, y, 1, 1).data;
      return [d[0] | 0, d[1] | 0, d[2] | 0];
    }

    function mapCoord(x, y, srcW, srcH, dstW, dstH) {
      if (srcW <= 1 || srcH <= 1 || dstW <= 0 || dstH <= 0) return [0, 0];
      const mx = Math.max(0, Math.min(dstW - 1, Math.round((x * (dstW - 1)) / (srcW - 1))));
      const my = Math.max(0, Math.min(dstH - 1, Math.round((y * (dstH - 1)) / (srcH - 1))));
      return [mx, my];
    }

    function pixelTextFromCanvas(activeCanvas, activeCtx, x, y) {
      const [ar, ag, ab] = sampleRGB(activeCtx, x, y);
      const [gx, gy] = mapCoord(x, y, activeCanvas.width, activeCanvas.height, grayCanvas.width, grayCanvas.height);
      const [bx, by] = mapCoord(x, y, activeCanvas.width, activeCanvas.height, binaryCanvas.width, binaryCanvas.height);
      const [gr, gg, gb] = sampleRGB(grayCtx, gx, gy);
      const [br, bg, bb] = sampleRGB(binaryCtx, bx, by);
      const gray = Math.round((gr + gg + gb) / 3);
      const binaryGray = Math.round((br + bg + bb) / 3);
      const bin = binaryGray >= 128 ? 1 : 0;
      if (activeCanvas === ipmRawCanvas) {
        const sample = findNearestCornerSample(latestStatus, x, y);
        if (sample) {
          return `x:${x} y:${y} | Gray:${gray} Bin:${bin} RGB:(${ar},${ag},${ab}) | Raw:${sample.raw.toFixed(4)} NMS:${sample.value.toFixed(4)}`;
        }
      }
      return `x:${x} y:${y} | Gray:${gray} Bin:${bin} RGB:(${ar},${ag},${ab})`;
    }

    function bindPixelProbe(canvas, ctx, infoEl) {
      canvas.addEventListener('mousemove', (ev) => {
        const [x, y] = getCanvasPoint(ev, canvas);
        infoEl.textContent = pixelTextFromCanvas(canvas, ctx, x, y);
      });
      canvas.addEventListener('mouseleave', () => {
        infoEl.textContent = 'x:- y:- | Gray:- Bin:- RGB:(-,-,-)';
      });
    }

    grayImg.onload = () => { renderGrayFrame(); };

    binaryImg.onload = () => {
      const size = latestStatus.gray_size || [160, 120];
      const w = size[0] || 160;
      const h = size[1] || 120;
      if (binaryCanvas.width !== w) binaryCanvas.width = w;
      if (binaryCanvas.height !== h) binaryCanvas.height = h;
      binaryCtx.drawImage(binaryImg, 0, 0, w, h);
    };

    function fmtArrayInline(arr) {
      if (!Array.isArray(arr)) return '[]';
      return `[${arr.map((v) => Array.isArray(v) ? `[${v.join(', ')}]` : String(v)).join(', ')}]`;
    }

    function fmtTrackMethod(method) {
      if (method === 0) return 'fixed';
      if (method === 1) return 'weighted';
      if (method === 2) return 'speed';
      return `unknown(${method})`;
    }

    function fmtCenterlineSource(source) {
      if (source === 0) return 'left_shift';
      if (source === 1) return 'right_shift';
      return `unknown(${source})`;
    }

    function fmtCenterlineSourceLabel(source) {
      if (source === 0) return '透视中线来源：自动选择（左边界平移）';
      if (source === 1) return '透视中线来源：自动选择（右边界平移）';
      return '透视中线来源：自动选择（未知）';
    }

    function fmtIntersectionMode(enabled) {
      return enabled ? 'intersection' : 'normal';
    }

    function fmtRoundaboutMode(mode) {
      if (mode === 1) return 'left_approach';
      if (mode === 2) return 'left_loop';
      if (mode === 3) return 'left_entry';
      if (mode === 4) return 'left_running';
      if (mode === 5) return 'left_exit';
      if (mode === 6) return 'left_out';
      if (mode === 7) return 'right_approach';
      if (mode === 8) return 'right_loop';
      if (mode === 9) return 'right_entry';
      if (mode === 10) return 'right_running';
      if (mode === 11) return 'right_exit';
      if (mode === 12) return 'right_out';
      return 'normal';
    }

    function fmtCurrentMode(status) {
      const roundabout = Number(status.roundabout_mode) || 0;
      if (roundabout !== 0) return fmtRoundaboutMode(roundabout);
      return fmtIntersectionMode(!!status.intersection_mode);
    }

    function buildStatusSummary(status) {
      const summary = {
        ts_ms: status.ts_ms,
        current_mode: fmtCurrentMode(status),
        intersection_mode: status.intersection_mode,
        intersection_stop_row: status.intersection_stop_row,
        intersection_current_start_row: status.intersection_current_start_row,
        roundabout_mode: fmtRoundaboutMode(status.roundabout_mode),
        line_error: status.line_error,
        base_speed: status.base_speed,
        capture_wait_us: status.capture_wait_us,
        preprocess_us: status.preprocess_us,
        otsu_us: status.otsu_us,
        maze_us: status.maze_us,
        total_us: status.total_us,
        red_found: status.red_found,
        red: fmtArrayInline(status.red),
        roi_valid: status.roi_valid,
        roi: fmtArrayInline(status.roi),
        ipm_track_valid: status.ipm_track_valid,
        ipm_track_method: fmtTrackMethod(status.ipm_track_method),
        ipm_centerline_source: fmtCenterlineSource(status.ipm_centerline_source),
        ipm_track_index: status.ipm_track_index,
        ipm_track_point: fmtArrayInline(status.ipm_track_point),
        gray_size: fmtArrayInline(status.gray_size),
        ipm_size: fmtArrayInline(status.ipm_size),
        left_boundary_count: Array.isArray(status.left_boundary) ? status.left_boundary.length : 0,
        right_boundary_count: Array.isArray(status.right_boundary) ? status.right_boundary.length : 0,
        ipm_left_boundary_count: Array.isArray(status.ipm_left_boundary) ? status.ipm_left_boundary.length : 0,
        ipm_right_boundary_count: Array.isArray(status.ipm_right_boundary) ? status.ipm_right_boundary.length : 0,
        ipm_raw_left_boundary_count: Array.isArray(status.ipm_raw_left_boundary) ? status.ipm_raw_left_boundary.length : 0,
        ipm_raw_right_boundary_count: Array.isArray(status.ipm_raw_right_boundary) ? status.ipm_raw_right_boundary.length : 0,
        ipm_corner_left_boundary_count: Array.isArray(status.ipm_corner_left_boundary) ? status.ipm_corner_left_boundary.length : 0,
        ipm_corner_right_boundary_count: Array.isArray(status.ipm_corner_right_boundary) ? status.ipm_corner_right_boundary.length : 0,
        ipm_centerline_from_left_shift_count: Array.isArray(status.ipm_centerline_from_left_shift) ? status.ipm_centerline_from_left_shift.length : 0,
        ipm_centerline_from_right_shift_count: Array.isArray(status.ipm_centerline_from_right_shift) ? status.ipm_centerline_from_right_shift.length : 0,
        src_centerline_from_left_shift_count: Array.isArray(status.src_centerline_from_left_shift) ? status.src_centerline_from_left_shift.length : 0,
        src_centerline_from_right_shift_count: Array.isArray(status.src_centerline_from_right_shift) ? status.src_centerline_from_right_shift.length : 0
      };
      return Object.entries(summary).map(([k, v]) => `${k}: ${v}`).join('\n');
    }

    async function pullStatus() {
      try {
        const r = await fetch('/api/status', { cache: 'no-store' });
        const j = await r.json();
        latestStatus = j;
        statusEl.textContent = buildStatusSummary(j);
        drawIpmBoundaries(j);
        ipmCenterlineSourceLabel.textContent = fmtCenterlineSourceLabel(j.ipm_centerline_source);
        metaEl.textContent = `status ok @ ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        metaEl.textContent = `status error: ${e}`;
      }
    }

    function pullFrames() {
      grayImg.src = `/api/frame_gray.jpg?t=${Date.now()}`;
      binaryImg.src = `/api/frame_binary.jpg?t=${Date.now()}`;
    }

    bindPixelProbe(grayCanvas, grayCtx, grayPixelInfo);
    bindPixelProbe(binaryCanvas, binaryCtx, binaryPixelInfo);
    bindPixelProbe(ipmCanvas, ipmCtx, ipmPixelInfo);
    bindPixelProbe(ipmRawCanvas, ipmRawCtx, ipmRawPixelInfo);

    toggleMeanCenterline.addEventListener('change', () => {
      showMeanCenterline = !!toggleMeanCenterline.checked;
      if (grayImg.complete && grayImg.naturalWidth > 0) renderGrayFrame();
    });
    toggleIpmAnchorDot.addEventListener('change', () => {
      showIpmAnchorDot = !!toggleIpmAnchorDot.checked;
      drawIpmBoundaries(latestStatus);
    });
    toggleBoundaryPointMode.addEventListener('change', () => {
      boundaryPointMode = !!toggleBoundaryPointMode.checked;
      drawIpmBoundaries(latestStatus);
      if (grayImg.complete && grayImg.naturalWidth > 0) renderGrayFrame();
    });
    setInterval(pullStatus, 120);
    setInterval(pullFrames, 60);
    pullStatus();
    pullFrames();
  </script>
</body>
</html>
