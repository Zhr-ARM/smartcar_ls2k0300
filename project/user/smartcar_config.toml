# 统一参数入口。
# 约定：
# 1. 启动时必须成功加载这份文件，否则程序直接退出。
# 2. 文件中每个已知参数都必须显式出现，避免“代码里还残留一个默认值入口”。

[meta]
# 配置文件格式版本号。
# 作用：约束解析器按哪一版字段表解释当前文件。
schema_version = 1

[vision.runtime]
# 图像发送模式。
# 0=binary 二值图，1=gray 灰度图。
send_mode = 1
# 图像发送链路最大帧率。
# 0 表示不限速。
send_max_fps = 60
# 推理总开关。
# false 时关闭红框检测和 ncnn 分类主链。
infer_enabled = false
# ncnn 分类子开关。
# false 时即使 infer_enabled=true，也只保留红框检测，不做 ncnn 分类。
ncnn_enabled = false
# 逐飞客户端发送开关。
# true 时启用客户端发送链路。
client_sender_enabled = false
# 车载屏显示开关。
# true 时启动屏幕显示线程。
screen_display_enabled = false
# 迷宫法起始搜索行。
# 值越大越靠近图像底部。
maze_start_row = 100
# 原图巡线方法。
# 0=迷宫法，1=八邻域法。
maze_trace_method = 1
# 迷宫法 y 回退停止阈值。
# 当后续 y 大于当前最小 y + 该阈值时停止追踪。
maze_trace_y_fallback_stop_delta = 15
# 十字下角点 dir 模板识别开关。
# true 时在八邻域 dir 序列上做平台跳变识别。
cross_lower_corner_dir_enabled = true
# 十字下角点前平台窗口长度。
# 用于检查角点前是否形成足够长的 {4,5}/{5,6} 平台。
cross_lower_corner_pre_window = 8
# 十字下角点后平台窗口长度。
# 用于检查角点后是否形成足够长的 {1,2}/{2,3} 平台。
cross_lower_corner_post_window = 8
# 十字下角点前平台最少投票数。
cross_lower_corner_pre_min_votes = 7
# 十字下角点后平台最少投票数。
cross_lower_corner_post_min_votes = 7
# 十字下角点平台间允许的最大过渡长度。
cross_lower_corner_transition_max_len = 4
# 左右下角点 y 坐标最大允许差值。
# 超出后不认为双边角点稳定同时成立。
cross_lower_corner_pair_y_diff_max = 30
# 普通原图下角点外推补线开关。
# true 时在下角点截断后，用角点前边界拟合直线向上补一段。
cross_lower_corner_extrapolate_enabled = false
# 原图下角点外推生效的最小 y 阈值。
# 只有角点 y 严格大于该值才做外推补线。
cross_lower_corner_extrapolate_min_y = 35
# 原图下角点外推补线的向上延伸行数。
cross_lower_corner_extrapolate_y_span = 30
# 原图直边判断时检查的边界前部点数。
src_boundary_straight_check_count = 80
# 原图直边判断中 dir=4/5 的最小占比阈值。
# 取值范围通常为 [0,1]。
src_boundary_straight_dir45_ratio_min = 0.95
# 去畸变开关。
# true 时使用相机标定参数做去畸变。
undistort_enabled = false
# IPM 边界三角滤波开关。
# true 时对 IPM 边界点做一次 1-2-1 平滑。
ipm_triangle_filter_enabled = true
# IPM 边界等距采样开关。
ipm_resample_enabled = true
# IPM 边界等距采样步长，单位像素。
ipm_resample_step_px = 3.0
# IPM 边界顺序近点去重阈值，单位像素。
ipm_boundary_min_point_dist_px = 1.4
# IPM 边界回跳毛刺判定中的短段长度阈值，单位像素。
ipm_boundary_spike_short_seg_max_px = 2.0
# IPM 边界回跳毛刺判定中的反向 cos 阈值。
ipm_boundary_spike_reverse_cos_threshold = -0.2
# IPM 边界三点法夹角计算步长。
ipm_boundary_angle_step = 3
# IPM 角点候选的 cos 阈值。
# 小于等于该值时进入角点候选判定。
ipm_boundary_corner_cos_threshold = 0.5
# IPM 角点 NMS 半径。
ipm_boundary_corner_nms_radius = 3
# IPM 首角点后截断开关。
# true 时检测到第一个角点后截断其后的边界点。
ipm_boundary_truncate_at_first_corner_enabled = true
# IPM 直边检测要求的最小边界点数。
ipm_boundary_straight_min_points = 30
# IPM 直边检测窗口长度。
ipm_boundary_straight_check_count = 20
# IPM 直边检测要求的最小 cos 阈值。
ipm_boundary_straight_min_cos = 0.95
# IPM 赛道宽度像素。
ipm_track_width_px = 28.0
# 默认目标中线距离左边界的偏移像素。
ipm_center_target_offset_from_left_px = 14.0
# weapons 类别命中后采用的左偏目标中线偏移。
ipm_center_target_offset_weapons_from_left_px = 4.0
# supplies 类别命中后采用的右偏目标中线偏移。
ipm_center_target_offset_supplies_from_left_px = 24.0
# 进入目标偏移引导前需要累计的有效推理结果数。
infer_offset_vote_result_count = 5
# 目标偏移引导恢复默认值前允许连续无红框的帧数。
infer_offset_restore_no_red_count = 5
# IPM 中线后处理总开关。
# 控制去重、平滑和重采样等后处理步骤。
ipm_centerline_postprocess_enabled = true
# IPM 中线三角滤波开关。
ipm_centerline_triangle_filter_enabled = true
# IPM 中线等距采样开关。
ipm_centerline_resample_enabled = true
# IPM 中线等距采样步长，单位像素。
ipm_centerline_resample_step_px = 3.0
# IPM 中线曲率计算开关。
ipm_centerline_curvature_enabled = true
# IPM 中线曲率计算步长。
ipm_centerline_curvature_step = 3
# 斑马线检测总开关。
zebra_cross_detection_enabled = true
# 双边都丢线时是否保留上一帧平移中线。
keep_last_centerline_on_double_loss = true
# 十字状态识别开关。
route_cross_detection_enabled = true
# normal/straight 进入 cross 所需的角点后沿边框连续行数最小值。
route_cross_entry_corner_post_frame_wall_rows_min = 5
# cross_1 进入 cross_2 的起始贴边连续行数阈值。
route_cross_stage2_enter_start_frame_wall_rows_min = 1
# cross_1 进入 cross_2 时角点 y 的最小阈值（任一侧满足即可）。
route_cross_stage1_enter_corner_y_min = 75
# cross_2 退出到 normal 的起始左右边界 x 差最大阈值。
route_cross_exit_start_gap_x_max = 155
# cross_3 规则边界跳变检测阈值（相邻点 x 差）。
route_cross_stage3_jump_x_threshold_px = 15
# cross_3 命中跳变后向前推进的点数。
route_cross_stage3_cut_forward_points = 8
# cross_3 左侧桥接锚点坐标。
route_cross_stage3_left_anchor_x = 15
route_cross_stage3_left_anchor_y = 100
# cross_3 右侧桥接锚点坐标。
route_cross_stage3_right_anchor_x = 145
route_cross_stage3_right_anchor_y = 100
# 圆环状态识别开关。
route_circle_detection_enabled = true
# 圆环入口判定中对侧边界最少点数要求。
route_circle_entry_min_boundary_count = 20
# 圆环入口判定中角点距离对侧边界尾部的最小保留余量。
route_circle_entry_corner_tail_margin = 20
# 圆环入口判定中，从角点 y 向上偏移后开始检查边界间距的行偏移。
route_circle_entry_corner_row_offset = 0
# 圆环入口判定中连续检查原始边界间距的行数。
route_circle_entry_gap_check_rows = 0
# 圆环入口判定中原始左右边界最小间距阈值。
route_circle_entry_min_raw_boundary_gap = 0
# 圆环入口判定中角点 y 最小阈值。
route_circle_entry_corner_y_min = 60
# 圆环状态 1/5 进入下一阶段的起始贴边连续行数阈值。
route_circle_stage_frame_wall_rows_enter = 30
# 圆环状态 3 进入下一阶段的对侧起始贴边连续行数阈值。
route_circle_stage3_frame_wall_rows_trigger = 70
# 圆环状态 6 抬高迷宫法搜线起始行的上限（行号越小越靠上）。
route_circle_stage6_maze_start_row = 80
# 圆环状态 circle4/5 的目标中线相对左边界偏移。
route_circle_center_target_offset_from_left_px = 14.0
# 圆环补线中贴边连续段的最小长度阈值。
circle_guide_min_frame_wall_segment_len = 8
# 圆环 state3 补线目标点向后偏移的索引数。
circle_guide_target_offset_stage3 = 5
# 圆环 state5 补线锚点向后偏移的索引数。
circle_guide_anchor_offset_stage5 = 0
# 圆环送 IPM 前触边判定边距（像素）。
route_circle_apply_touch_margin_px = 2
# straight 判定固定窗口最少中线点数。
route_straight_min_centerline_points = 20
# 进入 straight 状态所需的连续满足帧数。
route_straight_enter_consecutive_frames = 2
# straight 判定中固定窗口（前 N 点）绝对误差和上限。
route_straight_abs_error_sum_max = 20.0
# cross_1 中辅助点同 x 向上扫描白黑转变的最大行数。
cross_aux_vertical_scan_max_rows = 75
# cross_1 辅助八邻域边界允许的最大点数。
cross_aux_trace_max_points = 50
# cross_1 辅助边界向上延伸的最大行数。
cross_aux_trace_upward_rows_max = 30
# cross_2 中 4->6 跳变前平台要求的连续 dir=4 点数。
cross_upper_dir4_pre_run_len = 3
# cross_2 中 4->6 跳变允许的过渡区最大长度。
cross_upper_transition_max_len = 3
# cross_2 中 4->6 跳变后平台要求的连续 dir=6 点数。
cross_upper_dir6_post_run_len = 3
# line_error 偏好使用的中线来源。
# 0=左平移，1=右平移，2=自动。
ipm_line_error_source = 2
# line_error 计算方法。
# 0=固定索引，1=前缀线性加权索引，2=随速度索引，3=兼容模式(行为同1)。
ipm_line_error_method = 3

[vision.runtime.ncnn]
# ncnn 模型输入宽度。
input_width = 64
# ncnn 模型输入高度。
input_height = 64
# ncnn 标签数量。
# 必须与 labels 数组长度一致。
label_count = 3
# ncnn 类别标签表。
# 顺序必须与模型输出类别顺序一致。
labels = ["supplies", "vehicles", "weapons"]

[vision.runtime.web]
# 网页端 UDP 图传总开关。
enabled = true
# 网页端 UDP 图传最大发送帧率。
# 0 表示不限速。
max_fps = 30
# 是否发送灰度图。
send_gray_jpeg = true
# 灰度图发送格式。
# 0=JPEG，1=PNG，2=BMP。
gray_image_format = 0
# 是否发送二值图。
send_binary_jpeg = false
# 二值图发送格式。
# 0=JPEG，1=PNG，2=BMP。
binary_image_format = 0
# 是否发送彩图。
send_rgb_jpeg = false
# 彩图发送格式。
# 0=JPEG，1=PNG，2=BMP。
rgb_image_format = 1
# 网页数据模式。
# 0=FULL，1=RAW_MINIMAL。
data_profile = 0
# 网页端 TCP 状态发送总开关。
tcp_enabled = true
# PC 接收端 IP 地址。
server_ip = "172.21.79.129"
# PC 接收端 UDP 视频端口。
video_port = 10000
# PC 接收端 TCP 状态端口。
meta_port = 10001

[vision.runtime.web.tcp]
# 是否发送毫秒级时间戳。
ts_ms = false
# 是否发送 line_error。
line_error = true
# 是否发送 CPU 占用百分比。
cpu_usage_percent = true
# 是否发送内存占用百分比。
mem_usage_percent = true
# 是否发送基础速度。
base_speed = true
# 是否发送左轮目标速度。
left_target_count = true
# 是否发送右轮目标速度。
right_target_count = true
# 是否发送左轮当前编码器速度。
left_current_count = true
# 是否发送右轮当前编码器速度。
right_current_count = true
# 是否发送左轮滤波后速度。
left_filtered_count = false
# 是否发送右轮滤波后速度。
right_filtered_count = false
# 是否发送左轮速度误差。
left_error = false
# 是否发送右轮速度误差。
right_error = false
# 是否发送左轮前馈输出。
left_feedforward = false
# 是否发送右轮前馈输出。
right_feedforward = false
# 是否发送左轮 PID 修正项。
left_correction = false
# 是否发送右轮 PID 修正项。
right_correction = false
# 是否发送左轮减速辅助项。
left_decel_assist = false
# 是否发送右轮减速辅助项。
right_decel_assist = false
# 是否发送左轮 duty。
left_duty = false
# 是否发送右轮 duty。
right_duty = false
# 是否发送左轮硬件 duty。
left_hardware_duty = false
# 是否发送右轮硬件 duty。
right_hardware_duty = false
# 是否发送左轮方向 GPIO 电平。
left_dir_level = false
# 是否发送右轮方向 GPIO 电平。
right_dir_level = false
# 是否发送当前 otsu 阈值。
otsu_threshold = true
# 是否发送等待新图像耗时。
perf_capture_wait_us = false
# 是否发送预处理耗时。
perf_preprocess_us = false
# 是否发送 otsu 阶段耗时。
perf_otsu_us = false
# 是否发送迷宫法阶段耗时。
perf_maze_us = false
# 是否发送整帧总耗时。
perf_total_us = true
# 是否发送左边界原始真实点数。
maze_left_points_raw = true
# 是否发送右边界原始真实点数。
maze_right_points_raw = true
# 是否发送红框是否存在。
red_found = false
# 是否发送红框矩形。
red_rect = false
# 是否发送 ROI 是否有效。
roi_valid = false
# 是否发送 ROI 矩形。
roi_rect = false
# 是否发送当前 IPM 跟踪点是否有效。
ipm_track_valid = true
# 是否发送 line_error 取点方式。
ipm_track_method = false
# 是否发送当前选中的中线来源。
ipm_centerline_source = false
# 是否发送当前实际使用的中线点索引。
ipm_track_index = false
# 是否发送当前实际跟踪点坐标。
ipm_track_point = true
# 是否发送原图左边界点列。
left_boundary = true
# 是否发送原图右边界点列。
right_boundary = true
# 是否发送 IPM 左边界点列。
ipm_left_boundary = true
# 是否发送 IPM 右边界点列。
ipm_right_boundary = true
# 是否发送当前选中的 IPM 平移中线。
ipm_centerline_selected_shift = true
# 是否发送当前选中的原图回投平移中线。
src_centerline_selected_shift = true
# 是否发送当前选中的 IPM 平移中线点数。
ipm_centerline_selected_count = true
# 是否发送当前选中的原图回投平移中线点数。
src_centerline_selected_count = true
# 是否发送当前选中的 IPM 平移中线曲率数组。
ipm_centerline_selected_curvature = true
# 是否发送灰度图尺寸。
gray_size = true
# 是否发送 IPM 图尺寸。
ipm_size = true

[vision.runtime.assistant]
# 逐飞助手 UDP 通道开关。
enabled = false
# 逐飞助手接收端 IP。
server_ip = "172.21.79.129"
# 逐飞助手接收端端口。
server_port = 8899

[vision.processor]
# 单侧迷宫法最大输出点数。
maze_trace_max_points = 180
# 迷宫法允许追踪的纵向区域百分比。
# 100 表示全高。
maze_lower_region_percent = 85
# OTSU 策略开关。
# true=按需 OTSU，false=先生成整图二值图。
demand_otsu_enable = true
# 按需 OTSU 时是否保留全图二值缓存。
demand_otsu_keep_full_binary_cache = true
# 是否启用逆透视流程。
enable_inverse_perspective = true
# 逆透视输出宽度。
ipm_output_width = 280
# 逆透视输出高度。
ipm_output_height = 140
# 逆透视矩阵。
# 按 3x3 展平写入，顺序为行优先。
change_un_mat = [0.02963, -0.024954, -0.117149, 0.0, 0.000207, 0.607059, 0.0, -0.000323, 0.051471]
# 相机内参矩阵。
# 按 3x3 展平写入，顺序为行优先。
camera_matrix = [88.352003, 0.0, 76.039402, 0.0, 88.094982, 60.149306, 0.0, 0.0, 1.0]
# 畸变系数数组。
# 顺序为 [k1, k2, p1, p2, k3]。
dist_coeffs = [0.301435, -0.683306, -0.001952, -0.01992, 0.420358]
# 去畸变后 x 方向平移补偿。
undistort_move_x = 2
# 去畸变后 y 方向平移补偿。
undistort_move_y = -2
# line_error 默认采样行比例。
default_line_sample_ratio = 0.55
# 迷宫法默认允许搜索的最小 x。
default_maze_trace_x_min = 1
# 迷宫法默认允许搜索的最大 x。
default_maze_trace_x_max = 159

[pid.imu]
# 启动阶段 IMU 静止标定时长，单位毫秒。
startup_calibrate_duration_ms = 2000
# gyro_z 方向符号。
# 越抗漂越甩时通常要改成 -1。
gyro_yaw_rate_sign = 1.0
# gyro_z 低通滤波 alpha。
gyro_yaw_rate_filter_alpha = 0.45

[pid.motor_speed]
# 左轮速度环 Kp。
left_kp = 0.055
# 左轮速度环 Ki。
left_ki = 0.00078
# 左轮速度环 Kd。
left_kd = 0.0
# 右轮速度环 Kp。
right_kp = 0.055
# 右轮速度环 Ki。
right_ki = 0.00078
# 右轮速度环 Kd。
right_kd = 0.0
# 速度环积分限幅。
integral_limit = 180.0
# 单周期 PID 修正项最大变化步长。
max_output_step = 15.0
# PID 修正项总限幅。
correction_limit = 24.0
# 左轮前馈斜率。
left_feedforward_gain = 0.09
# 右轮前馈斜率。
right_feedforward_gain = 0.09
# 左轮静摩擦补偿。
left_feedforward_bias = 1.4
# 右轮静摩擦补偿。
right_feedforward_bias = 1.4
# 静摩擦补偿触发阈值。
feedforward_bias_threshold = 5.0
# 减速辅助触发误差阈值。
decel_error_threshold = 5.0
# 减速辅助增益。
decel_duty_gain = 0.18
# 减速辅助最大输出。
decel_duty_limit = 14.0
# 速度反馈平均窗口长度。
feedback_average_window = 2
# 速度反馈低通滤波 alpha。
feedback_low_pass_alpha = 0.95

[pid.brushless]
# 是否启用主循环实时无刷控制。
realtime_enabled = true
# 左侧无刷目标占空比，单位百分比 [0, 100]。
left_duty_percent = 30.0
# 右侧无刷目标占空比，单位百分比 [0, 100]。
right_duty_percent = 30.0

[pid.yaw_rate_loop]
